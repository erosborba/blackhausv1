name: eval

# Guard-rail G-1 (VANGUARD.md): roda o eval set contra o baseline pra detectar
# drift no comportamento da Bia. Falha se pass rate cair > 10% vs
# evals/baseline.json.
#
# MODO ATUAL: manual-only. Rodar via Actions → eval → "Run workflow" antes de
# mergear PR que toca src/agent/** ou src/lib/lead-memory.ts / copilot.ts /
# brief.ts. Decisão em 2026-04-23: não disparar em todo PR porque (a) outras
# áreas estão em alto volume de merges e eval queima ~$0.10 por run,
# (b) baseline atual é 27/27 e regressão é fácil de pegar rodando `npm run
# eval` local antes do push.
#
# Pra voltar a disparar automaticamente em PR que mexe no agente, adicionar
# de volta o bloco `pull_request:` com os paths relevantes.
#
# Secrets necessários:
#   SUPABASE_URL
#   SUPABASE_SECRET_KEY
#   SUPABASE_PUBLISHABLE_KEY
#   BH_EVAL_TOKEN            (pra autenticar o CLI no /api/eval/run)
#   ANTHROPIC_API_KEY
#   OPENAI_API_KEY           (retrieval usa embeddings OpenAI)

on:
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      BH_EVAL_TOKEN: ${{ secrets.BH_EVAL_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      APP_BASE_URL: http://localhost:3000
      BH_ALLOW_ROLE_STUB: "1"
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          nohup npm start > server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -fs http://localhost:3000/api/health >/dev/null 2>&1 || \
               curl -fs http://localhost:3000/ >/dev/null 2>&1; then
              echo "server up"; break
            fi
            sleep 2
          done

      - name: Seed eval set
        run: npm run eval:seed

      - name: Run eval with CI gate
        run: node scripts/eval-run.mjs --gate=ci

      - name: Server logs (on failure)
        if: failure()
        run: cat server.log || true
